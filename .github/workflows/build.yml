name: Build Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: brew install portaudio
      - run: pip install pyinstaller customtkinter Pillow pyaudio
      - run: pyinstaller tarot.spec --clean
      - uses: actions/upload-artifact@v4
        with:
          name: tarot-macos
          path: dist/*.app

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install pyinstaller customtkinter Pillow pyaudio
      - run: pyinstaller tarot.spec --clean
      - uses: actions/upload-artifact@v4
        with:
          name: tarot-windows
          path: dist/еЎ”зЅ—з‰ЊеЌ еЌњ/**

  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - run: |
          cd artifacts
          zip -r ../еЎ”зЅ—з‰ЊеЌ еЌњ-mac.zip tarot-macos/
          cd tarot-windows && zip -r ../еЎ”зЅ—з‰ЊеЌ еЌњ-win.zip .
      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "Release ${{ github.ref_name }}" \
            --generate-notes \
            "еЎ”зЅ—з‰ЊеЌ еЌњ-mac.zip" \
            "еЎ”зЅ—з‰ЊеЌ еЌњ-win.zip"
