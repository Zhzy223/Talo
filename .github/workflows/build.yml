name: Build Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: brew install portaudio
      - run: pip install pyinstaller customtkinter Pillow pyaudio
      - run: pyinstaller tarot.spec --clean --noconfirm
      - uses: actions/upload-artifact@v4
        with:
          name: tarot-macos
          path: dist/*.app

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install pyinstaller customtkinter Pillow pyaudio
      - run: pyinstaller tarot.spec --clean --noconfirm
      - uses: actions/upload-artifact@v4
        with:
          name: tarot-windows
          path: dist/塔罗牌占卜/**

  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - run: |
          cd artifacts
          zip -r ../tarot-macos.zip tarot-macos/
          zip -r ../tarot-windows.zip tarot-windows/
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            tarot-macos.zip
            tarot-windows.zip
